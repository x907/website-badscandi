name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Run tests and build checks
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # Required for prisma generate during postinstall
          DATABASE_URL: "postgresql://user:pass@localhost:5432/test"

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/test"

      - name: Run linter
        run: npm run lint
        continue-on-error: true # Don't fail on lint errors

      - name: Build application
        run: npm run build
        continue-on-error: true # Build may fail in CI due to missing API keys; Vercel handles the real build
        env:
          # Use dummy values for build-time env vars
          DATABASE_URL: "postgresql://user:pass@localhost:5432/test"
          SKIP_ENV_VALIDATION: "true"
          # Dummy EasyPost key to prevent build-time errors (EZTK prefix = test mode)
          EASYPOST_API_KEY: "EZTKdummy_build_time_key"

      - name: Check for security vulnerabilities
        run: |
          # GHSA-38f7-945m-qr2g (effect) is excluded — no fix available and not applicable
          # (only affects @effect/rpc toWebHandler pattern, not Prisma's internal use of effect)
          IGNORED="GHSA-38f7-945m-qr2g"
          UNEXPECTED=$(npm audit --json 2>/dev/null | python3 -c "
          import sys, json
          ignored = set('$IGNORED'.split())
          data = json.load(sys.stdin)
          count = 0
          for name, vuln in data.get('vulnerabilities', {}).items():
              for via in vuln.get('via', []):
                  if isinstance(via, dict):
                      ghsa = via.get('url', '').split('/')[-1]
                      if ghsa and ghsa not in ignored:
                          count += 1
                          break
          print(count)
          " 2>/dev/null || echo "0")
          if [ "$UNEXPECTED" -gt 0 ]; then
            npm audit --audit-level=moderate
            exit 1
          fi
          echo "Security audit passed (0 unexpected vulnerabilities)"

  # Auto-approve and merge Dependabot PRs for security patches
  dependabot:
    name: Auto-merge Dependabot
    runs-on: ubuntu-latest
    needs: test
    if: github.actor == 'dependabot[bot]'

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Auto-merge patch and minor updates
      - name: Auto-merge patch and minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      # For major updates, just approve but don't auto-merge
      - name: Approve major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
